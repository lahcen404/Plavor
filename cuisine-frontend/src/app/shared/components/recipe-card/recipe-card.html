<div [ngClass]="{'bg-food-light': bgLight}"
     class="relative rounded-3xl overflow-hidden shadow-md hover:shadow-lg transition h-full cursor-pointer"
     (click)="onRecipeClick()">
  <img [src]="recipe.image_url" alt="{{recipe.title}}" class="w-full h-48 object-cover" />
  <div class="p-6">
    <h3 class="font-semibold mb-2 line-clamp-2">{{recipe.title}}</h3>
    <div class="flex gap-4 text-sm text-gray-600">
      <span>⏱ {{recipe.prep_time + recipe.cook_time}} Minutes</span>
      <span>🍴 {{recipe.category}}</span>
    </div>
  </div>
  <button class="absolute top-4 right-4 bg-white/70 rounded-full p-2 hover:bg-white transition">
    ❤️
  </button>
</div>
