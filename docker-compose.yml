services:
  cuisine_app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: cuisine_app
    user: "1000:1000"
    volumes:
      - "${LOCAL_PATH}:/var/www/html"
    env_file:
      - .env
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: cuisine_nginx
    ports:
      - "${PHP_PORT}:80"
    volumes:
      - "${LOCAL_PATH}:/var/www/html"
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - cuisine_app

  angular_app:
    build:
      context: ./cuisine-frontend
      dockerfile: Dockerfile
    container_name: cuisine_angular
    ports:
      - "4201:4200"
    volumes:
      - ./cuisine-frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  postgres:
    image: postgres:17-alpine
    container_name: cuisine_postgres
    restart: always
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - cuisine_db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:snapshot
    container_name: cuisine_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD}"
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres

volumes:
  cuisine_db_data: